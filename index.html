<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Button Maze</title>
    <style>
        body { 
            font-family: sans-serif; 
            text-align: center; 
            background-color: #f4f4f9; 
            padding: 20px; 
        }
        #button-container { 
            display: flex; 
            flex-wrap: wrap; 
            justify-content: center; 
            gap: 5px; 
            max-width: 800px; 
            margin: 20px auto; 
        }
        button { 
            padding: 10px 15px; 
            cursor: pointer; 
            border: 1px solid #ccc; 
            background: white; 
            border-radius: 4px; 
            transition: background 0.2s;
        }
        button:hover { 
            background: #e0e0e0; 
        }
        #hint-message { 
            margin-top: 20px; 
            font-size: 18px;
            font-weight: bold; 
            color: #d9534f; 
            display: none;
            padding: 15px;
            border: 2px dashed #d9534f;
            background-color: #fdf7f7;
        }
    </style>
</head>
<body>

    <h1>Find the Secret Message</h1>
    <p>Click around if you dare...</p>
    
    <div id="hint-message">
        Wow, you've clicked 100 buttons! Here is a hint: Press <strong>F12</strong> on your keyboard and look at the "Console" tab.
    </div>

    <div id="button-container"></div>

   <script>
        const secretPageUrl = window.location.href.replace('index.html', '').replace(/\/$/, '') + '/secret.html';

        console.log("%c🎉 YOU FOUND THE SECRET CONSOLE!", "color: #27ae60; font-size: 22px; font-weight: bold; font-family: sans-serif;");
        
        console.log("Click the link below to claim your prize and go to the secret page:");
        
        console.log(secretPageUrl);
        
        const container = document.getElementById('button-container');
        const hintMessage = document.getElementById('hint-message');
        const totalButtons = 200; 
        const specialButtonIndex = 86; 
        let clickCount = 0; 

        function handleButtonClick() {
            clickCount++;
            if (clickCount === 100) {
                hintMessage.style.display = 'block'; 
            }
        }

        for (let i = 0; i < totalButtons; i++) {
            const btn = document.createElement('button');
            if (i === specialButtonIndex) {
                btn.textContent = "Click Me";
                btn.onclick = function() {
                    alert("Nothing here... but maybe you should check F12?");
                    handleButtonClick(); 
                };
            } else {
                btn.textContent = "Button " + (i + 1);
                btn.onclick = handleButtonClick;
            }
            container.appendChild(btn);
        }
    </script>
</body>
</html>
