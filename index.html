<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Button Maze</title>
    <style>
        body { 
            font-family: sans-serif; 
            text-align: center; 
            background-color: #f4f4f9; 
            padding: 20px; 
        }
        #button-container { 
            display: flex; 
            flex-wrap: wrap; 
            justify-content: center; 
            gap: 5px; 
            max-width: 800px; 
            margin: 20px auto; 
        }
        button { 
            padding: 10px 15px; 
            cursor: pointer; 
            border: 1px solid #ccc; 
            background: white; 
            border-radius: 4px; 
            transition: background 0.2s;
        }
        button:hover { 
            background: #e0e0e0; 
        }
        #hint-message { 
            margin-top: 20px; 
            font-size: 18px;
            font-weight: bold; 
            color: #d9534f; 
            display: none; /* Hidden by default */
            padding: 15px;
            border: 2px dashed #d9534f;
            background-color: #fdf7f7;
        }
    </style>
</head>
<body>

    <h1>Find the Secret Message</h1>
    <p>Click around if you dare...</p>
    
    <div id="hint-message">
        Wow, you've clicked 100 buttons! Here is a hint: Press <strong>F12</strong> on your keyboard and look at the "Console" tab.
    </div>

    <div id="button-container"></div>

    <script>
        // =====================================================================
        // PUT YOUR HIDDEN MESSAGE HERE
        // This is the message that prints to the F12 Developer Console.
        // Change the text inside the quotes below to whatever you want to hide!
        // =====================================================================
        
        console.log("%c🎉 YOU FOUND IT! Here is the super secret hidden message!", "color: green; font-size: 20px; font-weight: bold;");
        
        // =====================================================================

        const container = document.getElementById('button-container');
        const hintMessage = document.getElementById('hint-message');
        const totalButtons = 200; // Total number of distracting buttons
        const specialButtonIndex = 86; // The 87th button will be the one with the direct alert
        let clickCount = 0; // Starts the click counter at 0

        // Function that runs every time a normal button is clicked
        function handleButtonClick() {
            clickCount++;
            
            // Check if they reached 100 clicks
            if (clickCount === 100) {
                hintMessage.style.display = 'block'; // Unhides the hint message
            }
        }

        // Loop to generate all 200 buttons automatically
        for (let i = 0; i < totalButtons; i++) {
            const btn = document.createElement('button');
            
            // Create the ONE special button
            if (i === specialButtonIndex) {
                btn.textContent = "Click Me";
                btn.onclick = function() {
                    alert("Nothing here... but maybe you should check F12?");
                    handleButtonClick(); // Add to the click count
                };
            } 
            // Create all the normal distracting buttons
            else {
                btn.textContent = "Button " + (i + 1);
                btn.onclick = handleButtonClick;
            }
            
            // Add the button to the webpage
            container.appendChild(btn);
        }
    </script>
</body>
</html>
