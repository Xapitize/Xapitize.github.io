<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Message Encoder/Decoder</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background: #f4f4f9; padding: 20px; }
        .box { background: white; padding: 20px; border-radius: 8px; max-width: 500px; margin: 20px auto; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        input, button { margin: 10px 0; width: 100%; padding: 10px; box-sizing: border-box; }
        button { background: #27ae60; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background: #219653; }
        #decodeBtn { background: #2f80ed; }
        #decodeBtn:hover { background: #1b6ec2; }
        canvas { display: none; }
        img { max-width: 100%; margin-top: 10px; border-radius: 4px; }
    </style>
</head>
<body>

    <h1>🐱 Cat Image Steganography</h1>
    <p>Hide or reveal secret text inside images using Bit Plane Slicing (LSB).</p>

    <div class="box">
        <h2>1. Hide a Message</h2>
        <input type="file" id="uploadEncode" accept="image/*">
        <input type="text" id="secretMessage" value="w1-s1-v27-p241" placeholder="Enter message here">
        <button onclick="encodeMessage()">Encode & Download PNG</button>
    </div>

    <div class="box">
        <h2>2. Reveal a Message</h2>
        <input type="file" id="uploadDecode" accept="image/*">
        <button id="decodeBtn" onclick="decodeMessage()">Extract Secret Message</button>
        <h3 id="resultText" style="color: #d9534f; margin-top: 15px;"></h3>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        // Helper: Convert text string to binary string
        function textToBin(text) {
            let bin = "";
            for (let i = 0; i < text.length; i++) {
                let b = text.charCodeAt(i).toString(2);
                bin += "0".repeat(8 - b.length) + b;
            }
            return bin + "00000000"; // "Null terminator" to signal the end of the message
        }

        // Helper: Convert binary string back to text string
        function binToText(bin) {
            let text = "";
            for (let i = 0; i < bin.length; i += 8) {
                let byte = bin.substr(i, 8);
                if (byte === "00000000") break; // Stop reading when null terminator is hit
                text += String.fromCharCode(parseInt(byte, 2));
            }
            return text;
        }

        function encodeMessage() {
            const fileInput = document.getElementById('uploadEncode');
            const message = document.getElementById('secretMessage').value;
            
            if (!fileInput.files[0] || !message) {
                alert("Please select an image and enter a message!");
                return;
            }

            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    // Set canvas to the exact size of the cat image
                    canvas.width = img.width;
                    canvas.height = img.height;
                    ctx.drawImage(img, 0, 0);

                    // Grab all the pixel colors (RGBA)
                    let imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    let data = imgData.data;
                    let binMsg = textToBin(message);

                    if (binMsg.length > data.length) {
                        alert("Image is too small to hold this message! Use a larger image.");
                        return;
                    }

                    // Look at every pixel value and replace its 0th bit (LSB) with our message bit
                    for (let i = 0; i < binMsg.length; i++) {
                        data[i] = (data[i] & 0xFE) | parseInt(binMsg[i]);
                    }

                    // Save the altered pixels back to the canvas
                    ctx.putImageData(imgData, 0, 0);

                    // Force browser to download it as a PNG (Crucial to preserve the bits)
                    const link = document.createElement('a');
                    link.download = 'secret_cat.png';
                    link.href = canvas.toDataURL("image/png");
                    link.click();
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(fileInput.files[0]);
        }

        function decodeMessage() {
            const fileInput = document.getElementById('uploadDecode');
            const resultText = document.getElementById('resultText');
            
            if (!fileInput.files[0]) {
                alert("Please upload an encoded PNG image first!");
                return;
            }

            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    canvas.width = img.width;
                    canvas.height = img.height;
                    ctx.drawImage(img, 0, 0);

                    let imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    let data = imgData.data;
                    let binMsg = "";

                    // Extract the 0th bit from every pixel
                    for (let i = 0; i < data.length; i++) {
                        binMsg += (data[i] & 1).toString();
                        // Check every byte to see if we reached the null terminator early
                        if (binMsg.length % 8 === 0 && binMsg.slice(-8) === "00000000") {
                            break;
                        }
                    }

                    const decoded = binToText(binMsg);
                    resultText.innerText = decoded ? "Found Message: " + decoded : "No secret message found.";
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(fileInput.files[0]);
        }
    </script>
</body>
</html>
